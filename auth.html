<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="X-UA-Compatible" content="ie=edge">
        <title>TrackToGreen | Don't lose track of your exams.</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
        <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
        <link rel="shortcut icon" href="/favicon/favicon.ico" />
        <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
        <link rel="manifest" href="/favicon/site.webmanifest" />
    </head>
    <body>
        <header class="top-nav">
            <div class="logo" href="/index.html">
                tracktogreen<span class="dot">.com</span>
            </div>
        </header>

        <div class="auth-wrapper">
            <a href="/index.html" class="logo">tracktogreen<span class="dot">.com</span></a>
            
            <div class="auth-card">
                <div class="auth-toggle">
                    <button id="login-tab" class="active" onclick="toggleAuth('login')">Log In</button>
                    <button id="signup-tab" onclick="toggleAuth('signup')">Sign Up</button>
                </div>

                <form id="login-form" class="auth-form">
                    <h2>Welcome back</h2>
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" placeholder="name@email.com" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="cta-button">Log In</button>
                    <p class="switch-text"></p>
                </form>

                <form id="signup-form" class="auth-form hidden">
                    <h2>Create account</h2>
                    <div class="input-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="Alex Smith" required>
                    </div>
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" placeholder="name@email.com" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" placeholder="Min. 8 characters" required>
                    </div>
                    <button type="submit" class="cta-button">Start Tracking</button>
                    <p class="switch-text"></p>
                </form>
            </div>
        </div>

        <footer class="footer">
            <div class="footer-container">
                <div class="footer-brand">
                    <a href="#" class="logo">tracktogreen<span class="dot">.com</span></a>
                    <p>Master your exams with the traffic-light system.</p>
                </div>

                <div class="footer-links">
                    <div class="link-group">
                        <h4>Product</h4>
                        <a href="#how-it-works">How it works</a>
                        <a href="#pricing">Pricing</a>
                    </div>
                    <div class="link-group">
                        <h4>Legal</h4>
                        <a href="#">Privacy</a>
                        <a href="#">Terms</a>
                    </div>
                </div>
            </div>
            
            <div class="footer-bottom">
                <p>&copy; 2026 TrackToGreen. All rights reserved.</p>
            </div>
        </footer>

        <script type="module" src="script.js"></script>
    </body>
</html>
